name: Generate legacy feeds

on:
  push:
    branches: [agent/add-legacy-press-news]

permissions:
  contents: write

jobs:
  generate:
    if: ${{ !contains(github.event.head_commit.message, '[skip generate]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/add-legacy-press-news
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm run build
      - run: npm run check
      - run: npm test
      - run: git diff --check
      - name: Commit generated feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public
          if git diff --cached --quiet; then
            echo "Generated feeds are already current."
          else
            git commit -m "過去記事の生成フィードを更新 [skip generate]"
            git push origin HEAD:agent/add-legacy-press-news
          fi
