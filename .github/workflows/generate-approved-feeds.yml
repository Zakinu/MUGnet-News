name: Generate approved feeds

on:
  push:
    branches: [agent/add-approved-mugnet-updates]

permissions:
  contents: write

jobs:
  generate:
    if: ${{ !contains(github.event.head_commit.message, '[skip generate]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm run build
      - run: npm run check
      - run: npm test
      - run: git diff --check
      - name: Commit generated feeds
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add public
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "生成フィードを更新 [skip generate]"
          git push
