name: Validate news

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm ci
      - name: Run validation
        shell: bash
        run: |
          set +e
          npm run check > "$RUNNER_TEMP/check.log" 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 160 "$RUNNER_TEMP/check.log"
            exit "$status"
          fi
          cat "$RUNNER_TEMP/check.log"
      - run: git diff --check
      - name: Upload generated site preview
        uses: actions/upload-artifact@v4
        with:
          name: mugnet-news-public
          path: public
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7
