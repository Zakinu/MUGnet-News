name: Validate news

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm ci
      - run: npm run check
      - run: git diff --check
      - name: Upload generated site preview
        uses: actions/upload-artifact@v4
        with:
          name: mugnet-news-public
          path: public
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7
