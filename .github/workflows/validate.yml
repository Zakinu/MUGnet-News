name: Validate news

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: false
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm ci
      - name: Build generated site
        run: npm run build
      - name: Test news model
        run: node --test test/news.test.mjs
      - name: Test Press model
        run: node --test test/press.test.mjs
      - name: Test JSON Schema
        run: node --test test/schema.test.mjs
      - name: Test SEO output
        run: node --test test/seo-output.test.mjs
      - name: Test branding and search
        run: node --test test/brand-search.test.mjs
      - run: git diff --check
      - name: Upload generated site preview
        uses: actions/upload-artifact@v4
        with:
          name: mugnet-news-public
          path: public
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7
